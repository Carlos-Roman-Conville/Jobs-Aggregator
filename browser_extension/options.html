<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Job Pipeline Autofill — Options</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 720px; margin: 24px; }
    label { display: block; margin-top: 16px; font-weight: 600; }
    input, textarea { width: 100%; box-sizing: border-box; margin-top: 6px; }
    button { margin-top: 16px; padding: 10px 16px; }
    #msg { margin-top: 12px; }
  </style>
</head>
<body>
  <h1>Job Pipeline Autofill</h1>
  <p>Profile syncs from your local pipeline API by default. You can also paste JSON exported from the dashboard.</p>

  <label for="apiBase">Pipeline API profile URL</label>
  <input id="apiBase" type="url" placeholder="http://127.0.0.1:8000/autofill/profile" />

  <label for="profileJson">Import profile JSON (optional offline backup)</label>
  <textarea id="profileJson" rows="12" placeholder='Paste contents of job_pipeline/autofill_profile.json'></textarea>

  <button id="save" type="button">Save settings</button>
  <button id="import" type="button">Import JSON to storage</button>
  <div id="msg"></div>

  <script src="options.js"></script>
</body>
</html>
