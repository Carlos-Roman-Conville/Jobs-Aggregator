<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Job Pipeline Autofill</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 12px; width: 320px; }
    h1 { font-size: 15px; margin: 0 0 8px; }
    button { width: 100%; padding: 10px; margin: 6px 0; font-size: 14px; cursor: pointer; }
    #fill { background: #2563eb; color: #fff; border: none; border-radius: 8px; font-weight: 600; }
    #sync { background: #f3f4f6; border: 1px solid #d1d5db; border-radius: 8px; }
    #status { font-size: 12px; color: #374151; min-height: 36px; margin-top: 8px; white-space: pre-wrap; }
    .muted { color: #6b7280; font-size: 11px; margin-top: 8px; }
    .resume-section { margin-top: 12px; padding: 10px; background: #fffbeb; border: 1px solid #fcd34d; border-radius: 8px; }
    .resume-section h2 { font-size: 12px; margin: 0 0 6px; color: #92400e; text-transform: uppercase; letter-spacing: 0.5px; }
    .resume-filename { font-family: ui-monospace, monospace; font-size: 11px; word-break: break-all; background: #fef3c7; padding: 6px 8px; border-radius: 4px; margin: 4px 0 8px; color: #78350f; }
    .resume-btns { display: flex; gap: 6px; }
    .resume-btns button { flex: 1; padding: 6px 8px; font-size: 12px; margin: 0; background: #fbbf24; color: #78350f; border: none; border-radius: 6px; font-weight: 600; }
    .resume-btns button:hover { background: #f59e0b; }
    .creds-section { margin-top: 12px; padding: 10px; background: #eef2ff; border: 1px solid #818cf8; border-radius: 8px; }
    .creds-section h2 { font-size: 12px; margin: 0 0 6px; color: #3730a3; text-transform: uppercase; letter-spacing: 0.5px; }
    .creds-section .cred-row { font-family: ui-monospace, monospace; font-size: 11px; word-break: break-all; background: #e0e7ff; padding: 6px 8px; border-radius: 4px; margin: 4px 0; color: #312e81; }
    .creds-section .cred-label { font-family: system-ui, sans-serif; font-size: 10px; color: #6366f1; text-transform: uppercase; letter-spacing: 0.4px; margin-top: 6px; }
    .creds-section .cred-btns { display: flex; gap: 6px; }
    .creds-section .cred-btns button { flex: 1; padding: 6px 8px; font-size: 12px; margin: 0; background: #818cf8; color: #fff; border: none; border-radius: 6px; font-weight: 600; }
    .creds-section .cred-btns button:hover { background: #6366f1; }
    .creds-section .cred-note { font-size: 10px; color: #4338ca; margin-top: 6px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <h1>Job Pipeline Autofill</h1>
  <button id="fill" type="button">Fill this application</button>
  <button id="sync" type="button">Sync profile from pipeline</button>
  <div id="status" class="muted">Profile not loaded yet. Click Sync once while the API or dashboard export is available.</div>

  <div id="resume-section" class="resume-section hidden">
    <h2>📎 Resume to attach</h2>
    <div id="resume-filename" class="resume-filename"></div>
    <div class="resume-btns">
      <button id="copy-filename" type="button">Copy filename</button>
      <button id="copy-path" type="button">Copy full path</button>
    </div>
    <button id="highlight-field" type="button" style="margin-top:6px;background:#f3f4f6;color:#374151;border:1px solid #d1d5db;">Find resume field on page</button>
  </div>

  <div id="creds-section" class="creds-section hidden">
    <h2 id="creds-title">🔐 ATS account credentials</h2>
    <div class="cred-label">Email</div>
    <div id="cred-email" class="cred-row"></div>
    <div class="cred-label">Password</div>
    <div id="cred-password" class="cred-row"></div>
    <div class="cred-btns">
      <button id="copy-email" type="button">Copy email</button>
      <button id="copy-password" type="button">Copy password</button>
    </div>
    <div id="cred-note" class="cred-note"></div>
  </div>

  <p class="muted">Works on Indeed, iCIMS, Greenhouse, Lever, JazzHR, and most ATS forms. Review before Submit.</p>
  <script src="popup.js"></script>
</body>
</html>
