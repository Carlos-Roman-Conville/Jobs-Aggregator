      - "I am writing to express my interest in the IT Support Specialist position. Over the past several years I have built hands-on experience supporting end users, troubleshooting Windows and Linux systems, and maintaining reliable service desk operations.\n\nIn my current technical operations role I manage Linux-based server infrastructure, deploy and maintain kiosk hardware, and support networked AV and RFID systems. I am comfortable working through ticketing queues and communicating with non-technical stakeholders.\n\nI would welcome the opportunity to bring this mix of help desk discipline and systems troubleshooting to your team. Thank you for considering my application."
